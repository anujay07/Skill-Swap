<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Skill Swap</title>
  <link rel="stylesheet" href="./assets/contact.css">
</head>
<body>

  <header class="navbar">
    <div class="logo">
      <img src="./assets/logo.jpeg" alt="SkillSwap Logo">
      <span>SkillSwap</span>
    </div>
    <nav>
      <a href="landing.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
      <a href="login.html" class="btn small login">Sign In</a>
    </nav>
  </header>

  <section class="contact-container">
    <h2>Get in Touch</h2>
    <p class="subtitle">We’d love to hear from you! Send us a message and we’ll respond as soon as possible.</p>

    <form action="#" method="post" class="contact-form">
      <div class="form-group">
        <input type="text" name="name" placeholder="Your Name" required>
      </div>
      <div class="form-group">
        <input type="email" name="email" placeholder="Your Email" required>
      </div>
      <div class="form-group">
        <textarea name="message" rows="5" placeholder="Your Message..." required></textarea>
      </div>
      <button type="submit" class="btn send">Send Message</button>
    </form>
  </section>

</body>
</html>
