<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillSwap - Register</title>
  <link rel="stylesheet" href="./assets/register.css">
</head>
<body>

  <header class="navbar">
    <div class="logo">
      <img src="./assets/logo.jpeg" alt="SkillSwap Logo">
      <span>SkillSwap</span>
    </div>
    <div class="nav-right">
      <nav>
        <a href="landing.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <a href="login.html" class="btn small">Sign In</a>
    </div>
  </header>

  <section class="auth-container">
    <div class="auth-card">
      <h2>Create Account</h2>
      <form action="register" method="post">
        
        <div class="form-group">
          <label for="full_name">Full Name</label>
          <input type="text" id="full_name" name="full_name" placeholder="Your full name" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input 
            type="tel" 
            id="phone" 
            name="phone" 
            placeholder="eg: 9876543210" 
            pattern="[0-9]{10}" 
            maxlength="10"
            inputmode="numeric"
            title="Please enter a valid 10-digit phone number (digits only)."
            required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Create password" required>
        </div>

        <button type="submit" class="btn">Register</button>
      </form>

      <p class="link">Already have an account? <a href="login.html">Login</a></p>
    </div>
  </section>

</body>
</html>
